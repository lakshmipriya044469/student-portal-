<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="profile.css">
     <link rel="stylesheet" href="dashboardStyle.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">🎓 Student Portal</div>
    <div class="user">Lakshmi Priya</div>
</nav>

    <div class="profile-card">
        <div class="avatar">
            👤
        </div>

        <div class="profile-info">
            <h1 id="full-name"></h1>
            <p>Student - S4 ECE</p>
            <p>Student ID : ECE101</p>
        </div>

    </div>

    <div class="grid">

        <div class="card">
            <h2>👤 Personal Information</h2>

            <div class="row">
                <span>First Name</span>
                <span id="first-name">

                </span>
            </div>

            <div class="row">
                <span>Last Name</span>
                <span id="last-name"></span>
            </div>

            <div class="row">
                <span>Gender</span>
                <span id="gender"
                ></span>
            </div>

            <div class="row">
                <span>DOB</span>
                <span id="dob"></span>
            </div>

            <div class="row">
                <span>Blood Group</span>
                <span id="blood-group"></span>
            </div>
        </div>

        <div class="card">
            <h2>📞 Contact Information</h2>

            <div class="row">
                <span>Email</span>
                <span id="email"></span>
            </div>

            <div class="row">
                <span>Phone</span>

                <span id="phone"></span>
            </div>

            <div class="row">
                <span>Address</span>
                <span id="address">
                </span>
            </div>

            <div class="row">
                <span>PIN</span>
                <span id="pin"  ></span>
            </div>
        </div>

    </div>

    <div class="card emergency">

        <h2>⚠ Emergency Information</h2>

        <div class="row">
            <span>Contact Name</span>
            <span id="emergency-name"></span>
        </div>

        <div class="row">
            <span>Relationship</span>
            <span id="emergency-relationship"></span>
        </div>

        <div class="row">
            <span>Phone Number</span>
            <span id="emergency-phone"></span>
        </div>

    </div>

</div>

</body>  
<script src="profile.js"></script>
</html>
